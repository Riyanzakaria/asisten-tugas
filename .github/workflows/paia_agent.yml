# ============================================================
#  PAIA - Personal Academic Intelligence Agent
#  GitHub Actions Workflow
#  Dijalankan setiap jam dan bisa dipicu manual
# ============================================================

name: 🎓 PAIA - Academic Intelligence Agent

on:
  # Jalankan otomatis setiap awal jam bernomor genap (setiap 2 jam)
  # Format: menit jam hari bulan hari-minggu
  schedule:
    - cron: '0 */2 * * *'

  # Izinkan eksekusi manual dari tab Actions di GitHub
  workflow_dispatch:
    inputs:
      force_briefing:
        description: 'Paksa kirim Morning Briefing sekarang'
        type: boolean
        required: false
        default: false
      force_evening_briefing:
        description: 'Paksa kirim Evening Briefing sekarang'
        type: boolean
        required: false
        default: false
      reason:
        description: 'Alasan menjalankan manual (opsional)'
        required: false
        default: 'Manual trigger by user'

jobs:
  run-paia-agent:
    name: 🤖 Jalankan PAIA Agent
    runs-on: ubuntu-latest

    # Timeout 10 menit - cukup untuk semua operasi API
    timeout-minutes: 10

    steps:
      # ── Step 1: Ambil kode terbaru dari repository ──────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Python 3.10 ───────────────────────────────────────
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Cache pip untuk mempercepat workflow berikutnya
          cache: 'pip'

      # ── Step 3: Install semua dependencies dari requirements.txt ────────
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Kelola Cache Telegram Offset (Agar tidak duplikasi tugas) ──
      - name: 📥 Restore Telegram Offset
        uses: actions/cache@v3
        with:
          path: last_update_id.txt
          # Gunakan hash dari file atau key statis untuk pencarian cache
          key: telegram-offset-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            telegram-offset-${{ runner.os }}-
            telegram-offset-

      # ── Step 5: Eksekusi agen utama ─────────────────────────────────────
      - name: 🚀 Jalankan PAIA Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EDLINK_TOKEN: ${{ secrets.EDLINK_TOKEN }}
          EDLINK_EMAIL: ${{ secrets.EDLINK_EMAIL }}
          EDLINK_PASSWORD: ${{ secrets.EDLINK_PASSWORD }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
        run: |
          if [ "${{ github.event.inputs.force_briefing }}" == "true" ]; then
            echo "Memaksa mode Morning Briefing..."
            python main.py --briefing
          elif [ "${{ github.event.inputs.force_evening_briefing }}" == "true" ]; then
            echo "Memaksa mode Evening Briefing..."
            python main.py --evening
          else
            python main.py
          fi

      - name: 📤 Save Telegram Offset
        if: always()
        uses: actions/cache@v3
        with:
          path: last_update_id.txt
          key: telegram-offset-${{ runner.os }}-${{ github.run_id }}

      # ── Step 6: Tampilkan info jika terjadi kegagalan ───────────────────
      - name: ❌ Notifikasi Gagal (jika ada error)
        if: failure()
        run: |
          echo "PAIA Agent gagal dieksekusi. Periksa log di atas untuk detail error."
          echo "Waktu gagal: $(date '+%Y-%m-%d %H:%M:%S UTC')"
