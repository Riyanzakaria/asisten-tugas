# ============================================================
#  PAIA - Personal Academic Intelligence Agent
#  GitHub Actions Workflow
#  Dijalankan setiap jam dan bisa dipicu manual
# ============================================================

name: 🎓 PAIA - Academic Intelligence Agent

on:
  # Jalankan otomatis setiap awal jam (00 menit dari setiap jam)
  # Format: menit jam hari bulan hari-minggu
  schedule:
    - cron: '0 * * * *'

  # Izinkan eksekusi manual dari tab Actions di GitHub
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan menjalankan manual (opsional)'
        required: false
        default: 'Manual trigger by user'

jobs:
  run-paia-agent:
    name: 🤖 Jalankan PAIA Agent
    runs-on: ubuntu-latest

    # Timeout 10 menit - cukup untuk semua operasi API
    timeout-minutes: 10

    steps:
      # ── Step 1: Ambil kode terbaru dari repository ──────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Python 3.10 ───────────────────────────────────────
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Cache pip untuk mempercepat workflow berikutnya
          cache: 'pip'

      # ── Step 3: Install semua dependencies dari requirements.txt ────────
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Eksekusi agen utama ─────────────────────────────────────
      - name: 🚀 Jalankan PAIA Agent
        env:
          # Tarik secrets dari GitHub Secrets Repository
          # Cara set: Settings > Secrets and variables > Actions > New repository secret
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      # ── Step 5: Tampilkan info jika terjadi kegagalan ───────────────────
      - name: ❌ Notifikasi Gagal (jika ada error)
        if: failure()
        run: |
          echo "PAIA Agent gagal dieksekusi. Periksa log di atas untuk detail error."
          echo "Waktu gagal: $(date '+%Y-%m-%d %H:%M:%S UTC')"
